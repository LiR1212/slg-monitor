name: Update SLG monitor data

on:
  schedule:
    # Beijing 09:00 every day = UTC 01:00.
    - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      run_date:
        description: "Optional Beijing date, YYYY-MM-DD"
        required: false
        type: string

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright
        run: |
          npm init -y
          npm install --no-save playwright
          npx playwright install chromium

      - name: Browser collect candidates
        continue-on-error: true
        run: node scripts/playwright-collect.mjs

      - name: Generate data
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          APPMAGIC_URL: ${{ secrets.APPMAGIC_URL }}
          APPMAGIC_API_KEY: ${{ secrets.APPMAGIC_API_KEY }}
          SENSOR_TOWER_URL: ${{ secrets.SENSOR_TOWER_URL }}
          SENSOR_TOWER_API_KEY: ${{ secrets.SENSOR_TOWER_API_KEY }}
          DATA_AI_URL: ${{ secrets.DATA_AI_URL }}
          DATA_AI_API_KEY: ${{ secrets.DATA_AI_API_KEY }}
          APPTICA_URL: ${{ secrets.APPTICA_URL }}
          APPTICA_API_KEY: ${{ secrets.APPTICA_API_KEY }}
          RUN_DATE: ${{ inputs.run_date }}
        run: node scripts/update-data.mjs

      - name: Commit data updates
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update SLG monitor data"
          file_pattern: "data/*.json"