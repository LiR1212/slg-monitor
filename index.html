<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SLG 增量监控</title>
    <link rel="stylesheet" href="./assets/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="主导航">
        <div class="brand">
          <span class="brand-mark">SLG</span>
          <div>
            <strong>增量监控</strong>
            <span>日报 · 周报 · 月报</span>
          </div>
        </div>
        <nav class="nav-list">
          <button class="nav-item is-active" data-view="daily" type="button">日报</button>
          <button class="nav-item" data-view="games" type="button">游戏库</button>
          <button class="nav-item" data-view="activities" type="button">版本活动</button>
          <button class="nav-item" data-view="creatives" type="button">买量素材</button>
          <button class="nav-item" data-view="reports" type="button">报告</button>
          <button class="nav-item" data-view="settings" type="button">数据</button>
        </nav>
        <div class="sidebar-status">
          <span>监控池</span>
          <strong id="sidebarGameCount">20 款</strong>
        </div>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <p class="eyebrow">GLOBAL SLG INTELLIGENCE</p>
            <h1 id="viewTitle">日报</h1>
          </div>
          <div class="topbar-actions">
            <label class="field compact">
              <span>日期</span>
              <input id="dateFilter" type="date">
            </label>
            <div class="field compact game-multi-field">
              <span>游戏</span>
              <button id="gameFilterButton" class="multi-select-button" type="button" aria-expanded="false" aria-controls="gameFilterMenu">全部游戏</button>
              <div id="gameFilterMenu" class="multi-select-menu" hidden>
                <div id="gameFilterOptions" class="multi-select-options"></div>
              </div>
            </div>
            <label class="field compact">
              <span>平台</span>
              <select id="platformFilter">
                <option value="all">全部平台</option>
              </select>
            </label>
          </div>
        </header>

        <section class="summary-grid" id="summaryGrid" aria-label="关键指标"></section>

        <section class="toolbar">
          <div class="search-box">
            <input id="searchInput" type="search" placeholder="搜索游戏、活动、素材、国家、标签">
          </div>
          <div class="toolbar-actions">
            <button id="latestDateBtn" class="secondary-btn" type="button">最新数据日</button>
            <button id="exportJsonBtn" class="secondary-btn" type="button">导出 JSON</button>
            <button id="exportCsvBtn" class="secondary-btn" type="button">导出 CSV</button>
          </div>
        </section>

        <section id="content" class="content-area" aria-live="polite"></section>
      </main>
    </div>

    <template id="emptyStateTemplate">
      <div class="empty-state">
        <strong>当前筛选条件下没有记录</strong>
        <span>请切换日期、游戏或导入新的每日增量数据。</span>
      </div>
    </template>

    <script src="./assets/app.js"></script>
  </body>
</html>
